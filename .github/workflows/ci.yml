name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # 4) shellcheck + bash -n（静的検査）
  shellcheck:
    name: shellcheck & bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck install.sh uninstall.sh bootstrap.sh bin/serve.sh bin/sampler.sh test/smoke.sh
      - name: bash -n syntax check
        run: |
          for f in install.sh uninstall.sh bootstrap.sh bin/serve.sh bin/sampler.sh test/smoke.sh; do
            bash -n "$f"
          done

  # 5) Python lint（pace-json.py）
  python-lint:
    name: python lint (pace-json.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: py_compile
        run: python -m py_compile bin/pace-json.py bin/serve-http.py
      - name: ruff
        run: |
          python -m pip install --quiet ruff
          ruff check bin/pace-json.py bin/serve-http.py

  # 1) インストール一気通貫スモークテスト
  # 2) ubuntu + macOS マトリクス、かつ install.sh 直叩き(direct) と
  #    curl ワンライナー経路(bootstrap: ローカル checkout を clone) の両方
  smoke:
    name: smoke (${{ matrix.os }} / ${{ matrix.mode }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        mode: [direct, bootstrap]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # bootstrap がローカルリポジトリを clone するため浅くしない
      - name: ensure deps (jq / python3 / curl / git)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "macOS" ]; then
              brew install jq
            else
              sudo apt-get update && sudo apt-get install -y jq
            fi
          fi
          echo "jq      : $(jq --version)"
          echo "python3 : $(python3 --version)"
          echo "git     : $(git --version)"
          echo "bash    : $(bash --version | head -1)"
      - name: prepare local ref for bootstrap
        if: matrix.mode == 'bootstrap'
        run: git branch -f citest HEAD   # テスト対象コミットを clone 可能なブランチ名で指す
      - name: run smoke test
        env:
          SMOKE_INSTALL_MODE: ${{ matrix.mode }}
          SMOKE_BOOTSTRAP_REF: citest
        run: bash test/smoke.sh
